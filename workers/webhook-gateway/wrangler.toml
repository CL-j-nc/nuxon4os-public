name = "webhook-gateway"
# account_id loaded from CLOUDFLARE_ACCOUNT_ID env or wrangler login
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
APP_ENV = "production"

[[queues.producers]]
queue = "webhook-events"
binding = "WEBHOOK_QUEUE"

[durable_objects]
bindings = [
  { name = "IDEMPOTENCY", class_name = "IdempotencyDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IdempotencyDO"]

[[services]]
binding = "CONNECTOR_REGISTRY"
service = "connector-registry"

# Secrets (wrangler secret put):
# WEBHOOK_SECRET
