name = "poller-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "automation-events-db"
database_id = "dd666f84-ad60-4943-87fb-4bd36144e7d9"

# Queue binding to emit Standard Events
[[queues.producers]]
queue = "webhook-events"
binding = "EVENT_QUEUE"

# Cron trigger — every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Service binding: trigger claude-code-handler task execution
[[services]]
binding = "CLAUDE_CODE_HANDLER"
service = "claude-code-handler"

[[services]]
binding = "DASHBOARD_API"
service = "dashboard-api-worker"
