name = "observer-worker"
# account_id loaded from CLOUDFLARE_ACCOUNT_ID env or wrangler login
main = "src/index.js"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "automation-events-db"
database_id = "dd666f84-ad60-4943-87fb-4bd36144e7d9"

# Service Binding — proposals 直接通知，不经过 AI 推理
[[services]]
binding = "NOTIFIER"
service = "notifier-worker"

# Cron: every hour at :10
[triggers]
crons = ["10 * * * *"]
