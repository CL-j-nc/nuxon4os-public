name = "evolution-worker"
# account_id loaded from CLOUDFLARE_ACCOUNT_ID env or wrangler login
main = "src/index.js"
compatibility_date = "2024-12-01"

# Cron: daily 03:00 UTC
[triggers]
crons = ["0 3 * * *"]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "automation-events-db"
database_id = "dd666f84-ad60-4943-87fb-4bd36144e7d9"

# Queue producer (emit events back to main pipeline)
[[queues.producers]]
queue = "webhook-events"
binding = "WEBHOOK_QUEUE"
