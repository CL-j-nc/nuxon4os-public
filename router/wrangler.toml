name = "webhook-router"
main = "src/index.js"
compatibility_date = "2024-12-01"

[[queues.consumers]]
queue = "webhook-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "failed-events"

# Phase 2 预留：动态路由规则存储
[[kv_namespaces]]
binding = "ROUTE_KV"
id = "7dc0c112d4bf422b8716bcf8bd8ee950"

# Phase 2 预留：事件存储
# [[d1_databases]]
# binding = "EVENT_DB"
# database_id = ""

# Semantic Analyzer (Service Binding — same datacenter, ~0ms latency)
[[services]]
binding = "SEMANTIC"
service = "semantic-analyzer-worker"

# Secrets (set via wrangler secret put):
# TELEGRAM_BOT_TOKEN
